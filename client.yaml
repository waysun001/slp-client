log_level: info

tunnels:
  - name: "us-server"
    enabled: true
    server: "1.2.3.4"
    port: 443
    transport: "quic"
    token: "your-token-here"
    local_port: 1080
    insecure: true        # 自签名证书需要开启
    keepalive: 15
    pool_size: 2

  # 多隧道示例
